# MQTT 配置文件 - 华为云 IoT 平台
# 
# MQTT 服务器地址: {设备ID}.iot-mqtts.{区域}.myhuaweicloud.com
# 例: 01.iot-mqtts.cn-north-4.myhuaweicloud.com
#
# 设备密钥: 华为云 IoT → 设备详情 → 密钥
# 密码 = hmacsha256(设备密钥, 当前Unix时间戳)

[MQTT]
host     = 01.iot-mqtts.cn-north-4.myhuaweicloud.com
port     = 1883
clientid = 01_0_0_{timestamp}
username = 01
password = {预先生成的HMAC-SHA256密码}
keepalive = 60

# 设备ID (固定)
device_id = 01
